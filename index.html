<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Pacientes</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header class="header">
      <h1>Controle de Pacientes</h1>
    </header>
    
    <main class="container">
      <!-- FORM -->
      <form id="formPaciente" class="formulario">
        <div class="campo">
          <label>Nome do Paciente</label>
          <input type="text" id="nome" required />
        </div>

        <div class="campo">
          <label>Data de Internação</label>
          <input type="date" id="dataInternacao" required />
        </div>

        <!-- 🔥 BOTÕES AQUI DENTRO -->
        <div class="form-acoes">
          <button type="button" id="btnExportar" class="btn-exportar">
            <img src="./download.png" alt="Exportar" />
          </button>

          <button type="submit" class="btn">Adicionar Paciente</button>
        </div>
      </form>

      <!-- TABELA -->
      <table id="tabelaPacientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Internação</th>

            <th>01</th>
            <th>02</th>
            <th>03</th>
            <th>04</th>
            <th>05</th>
            <th>06</th>
            <th>07</th>
            <th>08</th>
            <th>09</th>
            <th>10</th>
            <th>11</th>
            <th>12</th>
            <th>13</th>
            <th>14</th>
            <th>15</th>
            <th>16</th>
            <th>17</th>
            <th>18</th>
            <th>19</th>
            <th>20</th>
            <th>21</th>
            <th>22</th>
            <th>23</th>
            <th>24</th>
            <th>25</th>
            <th>26</th>
            <th>27</th>
            <th>28</th>
            <th>29</th>
            <th>30</th>
            <th>31</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
